services:
  - type: web
    name: eventiq-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/app.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
